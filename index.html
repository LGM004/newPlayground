<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>SwissInfra Global Map</title>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.3.2/jspdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/0.4.1/html2canvas.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCAa5dcI9tswtlvTpIQHPvsvndUFbiE7vQ&callback=initMap&libraries=drawing,places,geometry&v=weekly" defer></script>

    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; font-family: Roboto, Arial, sans-serif; }
        #map { background-color: #e5e3df; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // --- Globale Variablen & State ---
        let map, drawingManager, infoWindow, geocoder;
        let currentPolylines = []; // Objekte aus der DB (Gesuche)
        let blockingPolygons = []; // Sperrflächen für Kollisions-Check
        let allCreatedShapes = []; // Vom User neu gezeichnete Objekte
        let searchMarker = null;
        let config = { mode: 'OVERVIEW', role: 'GAST' };

        // --- Initialisierung ---
        function initMap() {
            geocoder = new google.maps.Geocoder();
            infoWindow = new google.maps.InfoWindow();
            
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 46.884, lng: 8.1336 },
                zoom: 9,
                mapTypeControl: true,
                styles: [{ featureType: "poi", stylers: [{ visibility: "off" }] }]
            });

            setupDrawingManager();
            setupWmsLayer();
            
            // Signal an Wix: "Ich bin bereit"
            window.parent.postMessage({ action: "mapReady" }, "*");
        }

        function setupWmsLayer() {
            const EXTENT = [-Math.PI * 6378137, Math.PI * 6378137];
            const xyzToBounds = (x, y, z) => {
                const tileSize = (EXTENT[1] * 2) / Math.pow(2, z);
                return [EXTENT[0] + x * tileSize, EXTENT[1] - (y + 1) * tileSize, EXTENT[0] + (x + 1) * tileSize, EXTENT[1] - y * tileSize];
            };

            const landcover = new google.maps.ImageMapType({
                getTileUrl: (coord, zoom) => {
                    const bbox = xyzToBounds(coord.x, coord.y, zoom).join(",");
                    return `https://geowms.bl.ch/?version=1.1.1&REQUEST=GetMap&SERVICE=WMS&LAYERS=grundkarte_farbig_group&FORMAT=image/png&SRS=EPSG:3857&WIDTH=256&HEIGHT=256&BBOX=${bbox}`;
                },
                tileSize: new google.maps.Size(256, 256),
                name: "Kataster",
                maxZoom: 20
            });
            map.mapTypes.set("Landcover", landcover);
        }

        function setupDrawingManager() {
            drawingManager = new google.maps.drawing.DrawingManager({
                drawingMode: null,
                drawingControl: false,
                polylineOptions: { editable: true, strokeColor: '#3498db' },
                polygonOptions: { editable: true, fillColor: '#2ecc71', fillOpacity: 0.3 },
                rectangleOptions: { editable: true, fillColor: '#f1c40f', fillOpacity: 0.3 }
            });
            drawingManager.setMap(map);

            google.maps.event.addListener(drawingManager, 'overlaycomplete', (event) => {
                const newShape = event.overlay;
                const type = event.type;
                
                // Kollisionsprüfung mit Turf.js
                if (checkCollision(newShape, type)) {
                    newShape.setMap(null);
                    window.parent.postMessage({ action: "collisionDetected" }, "*");
                    return;
                }

                allCreatedShapes.push(newShape);
                const points = extractPoints(newShape, type);
                window.parent.postMessage({ action: "shapeCreated", type, points }, "*");
            });
        }

        // --- Helper Funktionen ---
        function checkCollision(shape, type) {
            if (blockingPolygons.length === 0) return false;
            const newGeoJSON = googleToTurf(shape, type);
            return blockingPolygons.some(block => {
                const blockGeoJSON = googleToTurf(block, 'polygon');
                return turf.intersect(newGeoJSON, blockGeoJSON);
            });
        }

        function googleToTurf(shape, type) {
            if (type === 'polyline') {
                return turf.lineString(shape.getPath().getArray().map(p => [p.lng(), p.lat()]));
            }
            let coords;
            if (type === 'rectangle') {
                const b = shape.getBounds();
                coords = [[ [b.getSouthWest().lng(), b.getSouthWest().lat()], [b.getNorthEast().lng(), b.getSouthWest().lat()], [b.getNorthEast().lng(), b.getNorthEast().lat()], [b.getSouthWest().lng(), b.getNorthEast().lat()], [b.getSouthWest().lng(), b.getSouthWest().lat()] ]];
            } else {
                const path = shape.getPath().getArray().map(p => [p.lng(), p.lat()]);
                path.push(path[0]); // Close polygon
                coords = [path];
            }
            return turf.polygon(coords);
        }

        function extractPoints(shape, type) {
            if (type === 'rectangle') {
                const b = shape.getBounds();
                return [
                    { lat: b.getNorthEast().lat().toString(), longitude: b.getNorthEast().lng().toString() },
                    { lat: b.getSouthWest().lat().toString(), longitude: b.getSouthWest().lng().toString() }
                ];
            }
            return shape.getPath().getArray().map(p => ({ lat: p.lat().toString(), longitude: p.lng().toString() }));
        }

        function formatDate(d) { return d ? new Date(d).toLocaleDateString("de-CH") : ""; }

        // --- Message Handler (Wix Interaktion) ---
        window.onmessage = async (event) => {
            debugger;
            const data = event.data;
            const actions = data.actions || (data.action ? [data] : []);

            for (const item of actions) {
                const payload = item.data || item;
                switch (item.action) {
                    case "initConfiguration":
                        config.mode = payload.mode;
                        config.role = payload.role;
                        break;

                    case "drawPolylines": // Bestehende Daten anzeigen
                        currentPolylines.forEach(p => p.setMap(null));
                        currentPolylines = [];
                        payload.forEach(proj => renderProject(proj));
                        break;

                    case "setRestrictedAreas": // Sperrflächen laden
                        blockingPolygons.forEach(p => p.setMap(null));
                        blockingPolygons = [];
                        payload.forEach(area => {
                            area.objects.forEach(obj => {
                                const p = new google.maps.Polygon({
                                    paths: obj.points.map(pt => ({ lat: parseFloat(pt.latitude), lng: parseFloat(pt.longitude) })),
                                    strokeColor: "red", fillOpacity: 0.2, map: map
                                });
                                blockingPolygons.push(p);
                            });
                        });
                        break;

                    case "startDrawing": // Modus: "polyline", "polygon", "rectangle"
                        drawingManager.setDrawingMode(payload.type);
                        break;
                    
                    case "stopDrawing":
                        drawingManager.setDrawingMode(null);
                        break;

                    case "clearNewShapes":
                        allCreatedShapes.forEach(s => s.setMap(null));
                        allCreatedShapes = [];
                        break;

                    case "setCenter":
                        const loc = new google.maps.LatLng(payload.lat || payload.coord.lat, payload.lng || payload.coord.lng || payload.coord.long);
                        map.setCenter(loc);
                        if (payload.zoom) map.setZoom(payload.zoom);
                        break;

                    case "search":
                        geocoder.geocode({ address: payload.formatted }, (res, status) => {
                            if (status === "OK") {
                                map.setCenter(res[0].geometry.location);
                                if (searchMarker) searchMarker.setMap(null);
                                searchMarker = new google.maps.Marker({ map, position: res[0].geometry.location });
                                map.setZoom(17);
                            }
                        });
                        break;
                }
            }
        };

        function renderProject(project) {
            project.objects.forEach(obj => {
                let mapObj;
                const coords = obj.points.map(p => ({ lat: Number(p.latitude), lng: Number(p.longitude) }));
                const color = project.color || 'blue';

                if (obj.type === 'polyline') {
                    mapObj = new google.maps.Polyline({ path: coords, strokeColor: color, strokeWeight: 3 });
                } else if (obj.type === 'polygon' || obj.type === 'rectangle') {
                    mapObj = new google.maps.Polygon({ paths: coords, fillColor: color, fillOpacity: 0.3, strokeColor: color });
                }

                if (mapObj) {
                    mapObj.setMap(map);
                    google.maps.event.addListener(mapObj, "click", (e) => {
                        const content = `
                            <div style="padding:10px; color:black;">
                                <strong>${project.title}</strong><br>
                                Status: ${project.status}<br>
                                Bis: ${formatDate(project.ende)}<br><br>
                                <button onclick="window.parent.postMessage({action:'navigate', id:'${project._id}'}, '*')">Details</button>
                            </div>`;
                        infoWindow.setContent(content);
                        infoWindow.setPosition(e.latLng);
                        infoWindow.open(map);
                    });
                    currentPolylines.push(mapObj);
                }
            });
        }
    </script>
</body>
</html>
