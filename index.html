      var EXTENT = [-Math.PI * 6378137, Math.PI * 6378137];

      function xyzToBounds(x, y, z) {
        var tileSize = (EXTENT[1] * 2) / Math.pow(2, z);
        var minx = EXTENT[0] + x * tileSize;
        var maxx = EXTENT[0] + (x + 1) * tileSize;
        // remember y origin starts at top
        var miny = EXTENT[1] - (y + 1) * tileSize;
        var maxy = EXTENT[1] - y * tileSize;
        return [minx, miny, maxx, maxy];
      }

      function openInfoWindowById(id) {
        // Suche in den aktuell gezeichneten Objekten
        debugger;
        const targetPoly = currentpolylines.find(
          (poly) => poly.get("id") === id,
        );

        if (targetPoly) {
          // Wir bestimmen ein Zentrum für das InfoWindow
          let position;
          const type = targetPoly.get("typ");

          if (type === "Rectangle") {
            position = targetPoly.getBounds().getCenter();
          } else if (type === "Polygon") {
            // Einfacher Mittelpunkt des Pfades
            const path = targetPoly.getPath();
            position = path.getAt(0);
          } else if (type === "PolyLine") {
            const path = targetPoly.getPath();
            position = path.getAt(Math.floor(path.getLength() / 2));
          }

          // Nutze deine bestehende Funktion zum Öffnen
          openInfoWindow({ latLng: position }, targetPoly);

          // Optional: Karte auf das Objekt zentrieren
          this.map.panTo(position);
        } else {
          console.log("Objekt mit ID " + id + " nicht auf der Karte gefunden.");
        }
      }

      function drawPolylines(projects) {
        const lineSymbol = {
          path: "M 0,-1 0,1",
          strokeOpacity: 1,
          scale: 4,
        };

        let polyLine = {};
        let strokeColor;

        //bestehende erstmal löschen...
        for (let singlePolyline of currentpolylines) {

        }

        for (let i = 0; i < (projects ? projects.length : 0); i++) {
          //Trello 99 || damit zentrieren auch bei Gemeinden ohne Gesuch funktioniert...
          let objects = projects[i].objects;

          if (projects[i].color) {
            strokeColor = projects[i].color;
          } else {
            strokeColor = "red";
          }

          for (let j = 0; j < objects.length; j++) {
            let points = objects[j].points;

            switch (objects[j].type) {
              case "polyline":
                let coOrds = [];
                for (let k = 0; k < points.length; k++) {
                  let singlePoint = {};
                  singlePoint.lat = Number(points[k].latitude);
                  singlePoint.lng = Number(points[k].longitude);
                  coOrds.push(singlePoint);
                }

                polyLine = new google.maps.Polyline({
                  path: coOrds,
                  geodesic: true,
                  strokeColor: strokeColor,
                  strokeOpacity: 0,
                  icons: [
                    {
                      icon: lineSymbol,
                      offset: "0",
                      repeat: "20px",
                    },
                  ],
                  strokeWeight: 2,
                });

                polyLine.set("typ", "PolyLine");

                break;

              case "polygon":
                const triangleCoords = [];

                for (let point of points) {
                  triangleCoords.push({
                    lat: Number(point.latitude),
                    lng: Number(point.longitude),
                  });
                }

                polyLine = new google.maps.Polygon({
                  paths: triangleCoords,
                  strokeColor: strokeColor,
                  fillColor: strokeColor,
                  fillOpacity: 0.4,
                  strokeOpacity: 1.0,
                  strokeWeight: 2,
                });

                polyLine.set("typ", "Polygon");

                break;

              case "rectangle":
                // let latLongBounds = new google.maps.LatLngBounds([{ lat: 7, lng: 47 }, { lat: 8, lng: 47 }]);

                polyLine = new google.maps.Rectangle({
                  bounds: {
                    north: Number(points[1].latitude),
                    south: Number(points[0].latitude),
                    east: Number(points[1].longitude),
                    west: Number(points[0].longitude),
                  },

                  strokeColor: strokeColor,
                  fillColor: strokeColor,
                  fillOpacity: 0.4,
                  strokeOpacity: 1.0,
                  strokeWeight: 2,
                });

                polyLine.set("typ", "Rectangle");

                break;
              default:
                break;
            }
            debugger;
            polyLine.set("description", projects[i].description);
            polyLine.set("projectName", projects[i].title);
            polyLine.set("id", projects[i]._id);
            polyLine.set("status", projects[i].status);
            polyLine.set("start", projects[i].start);
            polyLine.set("ende", projects[i].ende);
            polyLine.set("gsArt", projects[i].gsArt);

            if (projects[i].gsArt === "Sperrfläche") {
              polyLine.set("zweck", projects[i].zweck);
            }

            google.maps.event.addListener(polyLine, "click", function (event) {
              function getAreaOfPolyLine(currentPolyLine) {
                let rectBoundsLatlng = [];
                let rectBoundsLatlngPath = [];

                switch (currentPolyLine.typ) {
                  case "Rectangle":
                    rectBoundsLatlng[0] = currentPolyLine
                      .getBounds()
                      .getSouthWest();

                    rectBoundsLatlng[1] = currentPolyLine
                      .getBounds()
                      .getNorthEast();
                    ((rectBoundsLatlngPath[0] = new google.maps.LatLng(
                      rectBoundsLatlng[1].lat(),
                      rectBoundsLatlng[0].lng(),
                    )),
                      (rectBoundsLatlngPath[1] = new google.maps.LatLng(
                        rectBoundsLatlng[0].lat(),
                        rectBoundsLatlng[1].lng(),
                      )));

                    var areaPath = [
                      rectBoundsLatlng[0],
                      rectBoundsLatlngPath[0],
                      rectBoundsLatlng[1],
                      rectBoundsLatlngPath[1],
                      rectBoundsLatlng[0],
                    ];

                    return google.maps.geometry.spherical.computeArea(areaPath);

                    break;

                  case "Polygon":
                    return google.maps.geometry.spherical.computeArea(
                      currentpolylines[j].getPath(),
                    );

                    break;

                  case "PolyLine":
                    return 0;

                    break;

                  default:
                    break;
                }
              }

              function getSmallerPolyLine(currentPolyLine, minPolyLine) {
                if (!minPolyLine) {
                  return currentPolyLine;
                }

                return getAreaOfPolyLine(currentPolyLine) <
                  getAreaOfPolyLine(minPolyLine)
                  ? currentPolyLine
                  : minPolyLine;
              }

              //Ermittlung des kleinsten Polygons....
              let minPolyGon;

              for (var j = 0; j < currentpolylines.length; j++) {
                if (currentpolylines[j].typ === "Rectangle") {
                  if (currentpolylines[j].getBounds().contains(event.latLng)) {
                    minPolyGon = getSmallerPolyLine(
                      currentpolylines[j],
                      minPolyGon,
                    );
                  }
                }

                if (currentpolylines[j].typ === "Polygon") {
                  if (
                    google.maps.geometry.poly.containsLocation(
                      event.latLng,
                      currentpolylines[j],
                    )
                  ) {
                    minPolyGon = getSmallerPolyLine(
                      currentpolylines[j],
                      minPolyGon,
                    );
                  }
                }

                if (currentpolylines[j].typ === "PolyLine") {
                  if (
                    google.maps.geometry.poly.isLocationOnEdge(
                      event.latLng,
                      currentpolylines[j],
                      10e-6,
                    )
                  ) {
                    minPolyGon = currentpolylines[j];
                  }
                }
              }

              //infoWindow

              openInfoWindow(event, minPolyGon);
            });

            // Open the this.infowindow on mouseover:
            google.maps.event.addListener(polyLine, "mouseover", function (e) {
              debugger;
              openInfoWindow(e, this);
            });

            // // assuming you want the this.infowindow to close on mouseout
            google.maps.event.addListener(
              polyLine,
              "mouseout",
              function () {
                infoWindow.close();
              }.bind(this),
            );

            polyLine.setMap(this.map);

            currentpolylines.push(polyLine);
          }
        }
      }

      function formatDate(datum) {
        if (!datum || datum === "undefined") {
          return "";
        }
        var date = new Date(datum);
        return (
          date.getDate() +
          "." +
          (date.getMonth() + 1) +
          "." +
          date.getFullYear()
        );
      }

      function geocodeAddress(geocoder, resultsMap, address) {
        //  const address = document.getElementById("address").value;
        //const address = "Berlin";
        geocoder.geocode({ address: address }, (results, status) => {
          if (status === "OK") {
            resultsMap.setCenter(results[0].geometry.location);
            if (this.marker) {
              this.marker.setMap(null);
            }

            this.marker = new google.maps.Marker({
              map: resultsMap,
              position: results[0].geometry.location,
            });

            resultsMap.setZoom(17);
          } else {
            alert(
              "Geocode was not successful for the following reason: " + status,
            );
          }
        });
      }

      function setVisibilityUIControls(name, visible) {
        switch (name) {
          case "NeuesGesuch":
            this.controlnewProject.style.visibility = "hidden";

            break;

          default:
            break;
        }
      }


      function setUIElementsbyMode(newMode) {
        switch (newMode) {
          case "newMode":
            this.controlText2.innerHTML = "Zur Übersicht";
            this.controlReset.style.visibility = "hidden";
            this.controlSaveProject.style.visibility = "hidden";

            //neues Projekt
            this.drawingManager.setOptions({
              drawingControl: false,
            });
            this.drawingManager.setMap(this.map);

            if (this.scenario === PRO_CORD) {
              deleteCurrentPolylines();
            }

            break;
          case "singleMode":
          
            this.drawingManager.setOptions({
              drawingControl: false,
            });
            this.drawingManager.setMap(null);
     

            break;
          case "overviewMode":
   
            this.drawingManager.setOptions({
              drawingControl: false,
            });
            this.drawingManager.setMap(null);
            this.controlReset.style.visibility = "hidden";
            showCurrentPolylines();
            deleteNewPolylines();
            break;

          default:
            break;
        }
      }
